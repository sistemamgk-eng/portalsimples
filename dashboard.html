<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Dashboard</h1>

<canvas id="grafico"></canvas>

<script>
new Chart(document.getElementById("grafico"), {
    type: 'bar',
    data: {
        labels: ["Absenteísmo","Turnover","Vendas"],
        datasets: [{
            label: "Indicadores",
            data: [7,5,20000]
        }]
    }
});
</script>

</body>
</html>
